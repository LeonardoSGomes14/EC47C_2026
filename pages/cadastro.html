<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro – ODS 4</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>

    <header>
      <nav>
        <ul>
          <li><a href="../index.html">Início</a></li>
          <li><a href="cadastro.html">Cadastro</a></li>
          <li><a href="login.html">Login</a></li>
        </ul>
      </nav>
    </header>

    <main>

      <section>
        <h1>Criar Conta</h1>
        <p>Preencha os campos abaixo para se cadastrar e participar da comunidade ODS 4.</p>

        <form action="#" method="post" novalidate>

          <fieldset>
            <legend>Dados Pessoais</legend>

            <div>
              <label for="nome">Nome completo</label>
              <input
                type="text"
                id="nome"
                name="nome"
                placeholder="Seu nome completo"
                required
                autocomplete="name"
              />
            </div>

            <div>
              <label for="email">E-mail</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="seuemail@exemplo.com"
                required
                autocomplete="email"
              />
            </div>

            <div>
              <label for="data-nascimento">Data de nascimento</label>
              <input
                type="date"
                id="data-nascimento"
                name="data-nascimento"
                required
              />
            </div>

          </fieldset>

          <fieldset>
            <legend>Acesso</legend>

            <div>
              <label for="usuario">Nome de usuário</label>
              <input
                type="text"
                id="usuario"
                name="usuario"
                placeholder="Escolha um nome de usuário"
                required
                autocomplete="username"
              />
            </div>

            <div>
              <label for="senha">Senha</label>
              <input
                type="password"
                id="senha"
                name="senha"
                placeholder="Mínimo 8 caracteres"
                required
                minlength="8"
                autocomplete="new-password"
              />
            </div>

            <div>
              <label for="confirmar-senha">Confirmar senha</label>
              <input
                type="password"
                id="confirmar-senha"
                name="confirmar-senha"
                placeholder="Repita a senha"
                required
                minlength="8"
                autocomplete="new-password"
              />
            </div>

          </fieldset>

          <fieldset>
            <legend>Perfil</legend>

            <div>
              <label for="perfil">Você é:</label>
              <select id="perfil" name="perfil" required>
                <option value="" disabled selected>Selecione...</option>
                <option value="estudante">Estudante</option>
                <option value="professor">Professor(a)</option>
                <option value="outro">Outro</option>
              </select>
            </div>

          </fieldset>
          
          <div>
            <button type="submit">Criar Conta</button>
            <button type="reset">Limpar</button>
          </div>

        </form>

        <p>Já tem uma conta? <a href="login.html">Faça login</a>.</p>

      </section>

    </main>

    <footer>
      <p>Trabalho Acadêmico &mdash; ODS 4 Educação de Qualidade &mdash; Agenda 2030 ONU</p>
    </footer>

  </body>
</html>
